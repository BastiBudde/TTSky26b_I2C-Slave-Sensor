# Tiny Tapeout project information
project:
  title:        "chip_design_i2c_slave"      # Project title
  author:       "Sebastian Budde, Janina Speckmann"      # Your name
  discord:      "fl0cko"      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "I2C-Slave (up to FM+) with addressable 8x8-bit register-block and 8x8-bit read-only register-block connected to an lfsr"      # One line description of what your project does
  language:     "Verilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     25000000       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_BastiBudde_i2c_slave_sensor"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "tt_um_BastiBudde_i2c_slave_sensor.v"
    - "top_level.v"
    - "i2c_slave.v"
    - "reg_block.v"
    - "lfsr_writer.v"
    - "lfsr8.v"
    - "phase_accumulator.v"
    - "signal_bank.v"
    - "noise_mixer.v"
    - "signal_source.v"
    - "sine_lut.v"
    - "waveform_gen.v"
    - "amp_scale.v"

